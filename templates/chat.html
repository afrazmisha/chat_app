<!DOCTYPE html>
<html>

<head>
    <title>Chat Room</title>
</head>

<body>
    <h1 id="roomTitle"></h1>

    <div id="chatBox" style="border:1px solid black; height:300px; width:400px; overflow-y:auto; padding:10px;"></div>

    <br>

    <input id="messageInput" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>

    <script>
        const params = new URLSearchParams(window.location.search);
        const username = params.get("username");
        const room = params.get("room");

        document.getElementById("roomTitle").innerText = `Room: ${room}`;

        const socket = new WebSocket(`ws://127.0.0.1:8000/ws/${room}/${username}`);

        socket.onopen = function () {
            console.log("WebSocket connected");
        };

        socket.onmessage = function (event) {
            const chatBox = document.getElementById("chatBox");
            chatBox.innerHTML += `<p>${event.data}</p>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        };

        socket.onerror = function (error) {
            console.log("WebSocket error:", error);
        };

        socket.onclose = function () {
            console.log("WebSocket closed");
        };

        function sendMessage() {
            const input = document.getElementById("messageInput");
            const message = input.value.trim();

            if (message === "") {
                return;
            }

            socket.send(message);
            input.value = "";
        }

        document.getElementById("messageInput").focus();

        document
            .getElementById("messageInput")
            .addEventListener("keypress", function (event) {
                if (event.key === "Enter") {
                    sendMessage();
                }
            });
    </script>
</body>

</html>
